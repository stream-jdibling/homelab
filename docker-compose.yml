services:
  downloader:
    build:
      context: ./services/downloader
    container_name: downloader
    restart: unless-stopped
    volumes:
      - /data:/data
    ports:
      - "8081:8080"
    env_file:
      - .env
  transcriber:
    build:
      context: ./services/transcriber
    container_name: transcriber
    restart: unless-stopped
    volumes:
      - /data:/data
    ports:
      - "8082:8080"
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]